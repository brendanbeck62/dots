# set scroll history to 100,000 lines
set-option -g history-limit 100000


# do this so a login shell is not run every time.
    # https://superuser.com/questions/968942/why-does-tmux-create-new-windows-as-login-shells-by-default
set-option -g default-command "exec $SHELL"

# sends a different keystroke for <space> vs <cmd+space> etc.
# needed for tuis like pi
set -g extended-keys on

# modern colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"


# unbind the prefix and bind it to space
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# jump to marked
bind \` switch-client -t'{marked}'

# prefix+Space jumps to last window
bind Space last-window

# Jump to previous/next command output (works reliably with Ghostty + p10k)
# prefix + g enters copy mode and goes to first line of output
bind-key g copy-mode \; send-keys -X previous-prompt -o
#bind-key G copy-mode \; send-keys -X next-prompt -o
bind-key -T copy-mode    g send-keys -X previous-prompt -o
#bind-key -T copy-mode    G send-keys -X next-prompt -o
bind-key -T copy-mode-vi g send-keys -X previous-prompt -o
#bind-key -T copy-mode-vi G send-keys -X next-prompt -o

# copy to X clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe 'xclip -in -selection clipboard &> /dev/null'
bind -T copy-mode-vi Enter send-keys -X cancel

# shortcut for moving tmux buffer to clipboard
# useful if you've selected with the mouse
bind -nr C-y run "tmux show-buffer | xclip -in -selection clipboard &> /dev/null"

# Avoid ESC delay
set -sg escape-time 0

# Fix titlebar
set -g set-titles on
set -g set-titles-string "#{window_name}" # TODO maybe make this better
set-option -g status-style bg=default
set-window-option -g window-status-current-style bold
set-window-option -g automatic-rename on

# tabs start at 1, renumber when one is closed
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# VIM mode
set -g mode-keys vi

# Mouse friendly
set -g mouse on

# open panes in current dir
bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Move between panes with vi keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# copy-mode vim changes
bind -T copy-mode-vi L send-keys -X end-of-line
bind -T copy-mode-vi H send-keys -X start-of-line

# prefix + ctrl-u auto enters scroll mode (copy-mode -u)
    # -e means if you scroll all the way down it auto exits copy mode
bind u copy-mode -eu

bind Left swap-window -d -t -1
bind Right swap-window -d -t +1

######################
### DESIGN CHANGES ###
######################
# this works, but if you have vim open in a non-focused window
# its background doesnt change and thats jaring
#set -g window-style 'fg=colour245,bg=colour235'
#set -g window-active-style 'fg=#ebdbb2,bg=colour233'

# Avoid date/time taking up space
set -g status-right ''
# uncomment for kubecontext name in tmux status bar (also in right side of powerline prompt)
#set -g status-right '#(~/.tmux/plugins/tmux-kube-context/scripts/status-line.sh)'
set -g status-right-length 0

#https://github.com/brendanbeck62/tmux-kube-context
if-shell "test -d ~/.tmux/plugins/tmux-kube-context" \
  "run-shell ~/.tmux/plugins/tmux-kube-context/kube-context.tmux"
